<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistics - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div><h2>System Statistics</h2><div class="mt-desc">Overview of recruitment data and trends</div></div>
    </div>

    <div class="stat-grid" id="stats"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Application Status Distribution</div>
        <div class="chart-placeholder" id="appChart"></div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Position Status Distribution</div>
        <div class="chart-placeholder" id="posChart"></div>
      </div>
    </div>

    <div class="card mt-20">
      <div class="card-title" style="margin-bottom:16px">Applications per Position</div>
      <div class="chart-placeholder" id="perPosChart" style="height:220px"></div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
bootstrapPage('ADMIN', init, 'stats');

async function init() {
  const [stats, positions, apps] = await Promise.all([
    api('/stats'),
    api('/positions'),
    api('/applications')
  ]);

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="sc-icon">💼</div><div class="sc-label">Total Positions</div><div class="sc-value">${stats.totalPositions}</div></div>
    <div class="stat-card"><div class="sc-icon">📋</div><div class="sc-label">Total Applications</div><div class="sc-value">${stats.totalApplications}</div></div>
    <div class="stat-card"><div class="sc-icon">🎓</div><div class="sc-label">Total TAs</div><div class="sc-value">${stats.totalTAs}</div></div>
    <div class="stat-card"><div class="sc-icon">👨‍🏫</div><div class="sc-label">Module Owners</div><div class="sc-value">${stats.totalMOs}</div></div>`;

  renderBarChart('appChart', [
    { label: 'Pending', value: stats.pendingApplications, color: 'var(--warning)' },
    { label: 'Passed', value: stats.passedApplications, color: 'var(--success)' },
    { label: 'Failed', value: stats.failedApplications, color: 'var(--danger)' }
  ]);

  renderBarChart('posChart', [
    { label: 'Approved', value: stats.approvedPositions, color: 'var(--success)' },
    { label: 'Pending', value: stats.pendingPositions, color: 'var(--warning)' },
    { label: 'Other', value: stats.totalPositions - stats.approvedPositions - stats.pendingPositions, color: 'var(--gray-400)' }
  ]);

  const posApps = positions.map(p => ({
    label: p.courseCode,
    value: apps.filter(a => a.positionId === p.id).length,
    color: 'var(--primary)'
  }));
  renderBarChart('perPosChart', posApps);
}

function renderBarChart(containerId, data) {
  const container = document.getElementById(containerId);
  const maxVal = Math.max(...data.map(d => d.value), 1);
  const maxH = container.clientHeight - 50;
  container.innerHTML = data.map(d => {
    const h = Math.max((d.value / maxVal) * maxH, 4);
    return `<div class="chart-bar" style="height:${h}px;background:${d.color}">
      <span class="cb-val">${d.value}</span>
      <span class="cb-label">${d.label}</span>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
