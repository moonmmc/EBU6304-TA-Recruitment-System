<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA Workload - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div><h2>TA Workload</h2><div class="mt-desc">Monitor teaching assistant workload distribution</div><div class="table-wrapper">
      <table>
        <thead><tr><th>TA Name</th><th>ID</th><th>Programme</th><th>Assigned Positions</th><th>Total Hours/Week</th><th>Workload</th></tr></thead>
        <tbody id="wlBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
bootstrapPage('ADMIN', init, 'workload');

async function init() {
  const [tas, apps, positions] = await Promise.all([
    api('/users?role=TA'),
    api('/applications'),
    api('/positions')
  ]);

  const body = document.getElementById('wlBody');
  if (tas.length === 0) {
    body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-400)">No TAs registered</td></tr>';
    return;
  }

  body.innerHTML = tas.map(ta => {
    const assigned = apps.filter(a => a.taId === ta.id && a.status === 'PASSED');
    let totalHours = 0;
    assigned.forEach(a => {
      const pos = positions.find(p => p.id === a.positionId);
      if (pos) totalHours += pos.hoursPerWeek;
    });
    const maxHours = 20;
    const pct = Math.min((totalHours / maxHours) * 100, 100);
    const barColor = pct > 80 ? 'var(--danger)' : pct > 50 ? 'var(--warning)' : 'var(--success)';

    return `<tr>
      <td><strong>${escapeHtml(ta.name)}</strong></td>
      <td>${ta.id}</td>
      <td>${ta.programme || '-'}</td>
      <td>${assigned.length}</td>
      <td>${totalHours}h</td>
      <td style="min-width:120px">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <div style="font-size:10px;color:var(--gray-400);margin-top:2px">${totalHours}/${maxHours}h</div>
      </td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
