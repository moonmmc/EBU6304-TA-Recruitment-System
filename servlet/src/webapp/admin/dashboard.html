<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div>
        <h2>Admin Dashboard</h2>
        <div class="mt-desc">System overview and management</div>
      </div>
    </div>

    <div class="stat-grid" id="stats"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Positions Pending Approval</div>
        <div id="pendingList" style="margin-top:12px"></div>
      </div>
      <div class="card">
        <div class="card-title">Recent Applications</div>
        <div id="recentApps" style="margin-top:12px"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
bootstrapPage('ADMIN', init, 'dashboard');

async function init() {
  const stats = await api('/stats');

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="sc-icon">💼</div><div class="sc-label">Total Positions</div><div class="sc-value">${stats.totalPositions}</div></div>
    <div class="stat-card"><div class="sc-icon">📋</div><div class="sc-label">Applications</div><div class="sc-value">${stats.totalApplications}</div></div>
    <div class="stat-card"><div class="sc-icon">🎓</div><div class="sc-label">Registered TAs</div><div class="sc-value">${stats.totalTAs}</div></div>
    <div class="stat-card"><div class="sc-icon">👥</div><div class="sc-label">Total Users</div><div class="sc-value">${stats.totalUsers}</div></div>`;

  const [positions, apps] = await Promise.all([
    api('/positions?status=PENDING'),
    api('/applications')
  ]);

  document.getElementById('pendingList').innerHTML = positions.length === 0
    ? '<div style="padding:20px;text-align:center;color:var(--gray-400)">No pending positions</div>'
    : positions.slice(0, 5).map(p => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--gray-700)">${escapeHtml(p.courseName)}</div>
          <div style="font-size:11px;color:var(--gray-400)">${p.courseCode} · by ${escapeHtml(p.moName)}</div>
        </div>
        <a href="/admin/approve.html" class="btn btn-sm btn-outline">Review</a>
      </div>`).join('');

  const recent = apps.slice(-5).reverse();
  document.getElementById('recentApps').innerHTML = recent.length === 0
    ? '<div style="padding:20px;text-align:center;color:var(--gray-400)">No applications</div>'
    : recent.map(a => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--gray-700)">${escapeHtml(a.taName)}</div>
          <div style="font-size:11px;color:var(--gray-400)">${a.positionTitle} · ${formatDate(a.appliedDate)}</div>
        </div>
        <span class="badge ${badgeClass(a.status)}">${a.status}</span>
      </div>`).join('');
}
</script>
</body>
</html>
