<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Positions - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div><h2>Approve Positions</h2><div class="mt-desc">Review and approve position requests from Module Owners</div><div class="tabs">
      <button class="tab active" data-f="PENDING" onclick="setTab('PENDING',this)">Pending</button>
      <button class="tab" data-f="APPROVED" onclick="setTab('APPROVED',this)">Approved</button>
      <button class="tab" data-f="REJECTED" onclick="setTab('REJECTED',this)">Rejected</button>
      <button class="tab" data-f="CLOSED" onclick="setTab('CLOSED',this)">Closed</button>
      <button class="tab" data-f="ALL" onclick="setTab('ALL',this)">All</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead><tr><th>Course</th><th>Code</th><th>Posted By</th><th>Positions</th><th>Deadline</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="posBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
let allPos = [], filter = 'PENDING';
bootstrapPage('ADMIN', init, 'approve');

async function init() {
  allPos = await api('/positions');
  render();
}

function setTab(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = filter === 'ALL' ? allPos : allPos.filter(p => p.status === filter);
  const body = document.getElementById('posBody');
  if (list.length === 0) {
    body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">No positions found</td></tr>';
    return;
  }
  body.innerHTML = list.map(p => `
    <tr>
      <td><strong>${escapeHtml(p.courseName)}</strong></td>
      <td>${p.courseCode}</td>
      <td>${escapeHtml(p.moName)}</td>
      <td>${p.numPositions}</td>
      <td>${p.deadline}</td>
      <td><span class="badge ${badgeClass(p.status)}">${p.status}</span></td>
      <td>${p.status === 'PENDING' ? `
        <button class="btn btn-sm btn-success" onclick="updateStatus('${p.id}','APPROVED')">Approve</button>
        <button class="btn btn-sm btn-danger" onclick="updateStatus('${p.id}','REJECTED')">Reject</button>`
        : p.status === 'APPROVED' ? `
        <button class="btn btn-sm btn-secondary" onclick="updateStatus('${p.id}','CLOSED')">Close</button>`
        : '-'}</td>
    </tr>`).join('');
}

async function updateStatus(id, status) {
  try {
    await api('/positions/' + id + '/status', {
      method: 'PUT',
      body: JSON.stringify({ status })
    });
    toast('Position ' + status.toLowerCase());
    allPos = await api('/positions');
    render();
  } catch (err) { toast(err.message, 'error'); }
}
</script>
</body>
</html>
