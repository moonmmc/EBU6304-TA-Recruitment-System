<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div><h2>Manage Users</h2><div class="mt-desc">View and manage all system users</div><div class="tabs">
      <button class="tab active" data-f="ALL" onclick="setTab('ALL',this)">All Users</button>
      <button class="tab" data-f="TA" onclick="setTab('TA',this)">TAs</button>
      <button class="tab" data-f="MO" onclick="setTab('MO',this)">Module Owners</button>
      <button class="tab" data-f="ADMIN" onclick="setTab('ADMIN',this)">Admins</button>
    </div>

    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="Search users by name, ID, or email..." oninput="renderUsers()">
    </div>

    <div class="table-wrapper">
      <table>
        <thead><tr><th>User</th><th>ID</th><th>Email</th><th>Role</th><th>Programme</th><th>Skills</th></tr></thead>
        <tbody id="userBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
let allUsers = [], filter = 'ALL';
bootstrapPage('ADMIN', init, 'users');

async function init() {
  allUsers = await api('/users');
  renderUsers();
}

function setTab(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderUsers();
}

function renderUsers() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let list = filter === 'ALL' ? allUsers : allUsers.filter(u => u.role === filter);
  if (q) list = list.filter(u => (u.name + ' ' + u.id + ' ' + u.email).toLowerCase().includes(q));

  const body = document.getElementById('userBody');
  const roleColors = { TA: 'badge-info', MO: 'badge-purple', ADMIN: 'badge-warning' };
  const colors = ['#2563EB', '#7C3AED', '#059669', '#D97706', '#DC2626'];

  if (list.length === 0) {
    body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-400)">No users found</td></tr>';
    return;
  }

  body.innerHTML = list.map((u, i) => {
    const skills = (u.skills || '').split(';').filter(Boolean).slice(0, 3);
    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="sidebar-avatar" style="width:32px;height:32px;font-size:12px;background:${colors[i % colors.length]}">${initials(u.name)}</div>
          <strong>${escapeHtml(u.name)}</strong>
        </div>
      </td>
      <td>${u.id}</td>
      <td>${u.email}</td>
      <td><span class="badge ${roleColors[u.role] || 'badge-gray'}">${u.role}</span></td>
      <td>${u.programme || '-'}</td>
      <td>${skills.length ? skills.map(s => '<span class="tag">' + escapeHtml(s) + '</span>').join('') : '-'}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
