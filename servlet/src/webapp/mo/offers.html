<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Letters - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div><h2>Offer Letters</h2><div class="mt-desc">Generate and preview offer letters for accepted TAs</div></div>
    </div>

    <div class="form-group" style="max-width:300px">
      <label class="form-label">Select Position</label>
      <select class="form-select" id="posSelect" onchange="loadOffers()">
        <option value="">-- Choose a position --</option>
      </select>
    </div>

    <div id="offersArea"></div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
let myPositions = [], allApps = [];
bootstrapPage('MO', init, 'offers');

async function init() {
  [myPositions, allApps] = await Promise.all([
    api('/positions?moId=' + user.id),
    api('/applications')
  ]);

  const sel = document.getElementById('posSelect');
  myPositions.filter(p => p.status === 'APPROVED').forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = p.courseName + ' (' + p.courseCode + ')';
    sel.appendChild(o);
  });
}

function loadOffers() {
  const posId = document.getElementById('posSelect').value;
  const area = document.getElementById('offersArea');
  if (!posId) { area.innerHTML = ''; return; }

  const pos = myPositions.find(p => p.id === posId);
  const accepted = allApps.filter(a => a.positionId === posId && a.status === 'PASSED');

  if (accepted.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="es-icon">📄</div><div class="es-text">No accepted applicants for this position yet</div></div>';
    return;
  }

  area.innerHTML = accepted.map(a => `
    <div class="offer-preview" style="margin-bottom:24px">
      <div class="op-header">
        <div style="font-size:12px;color:var(--gray-400);margin-bottom:4px">Beijing University of Posts and Telecommunications</div>
        <h3>Teaching Assistant Offer Letter</h3>
      </div>
      <div class="op-body">
        <p>Dear <span class="op-field">${escapeHtml(a.taName)}</span>,</p>
        <p style="margin-top:12px">We are pleased to offer you the position of <strong>Teaching Assistant</strong> for the course:</p>
        <p style="margin:12px 0"><span class="op-field">${escapeHtml(pos.courseName)}</span> (<span class="op-field">${pos.courseCode}</span>)</p>
        <p><strong>Details:</strong></p>
        <ul style="padding-left:20px;margin:8px 0">
          <li>Department: ${escapeHtml(pos.department)}</li>
          <li>Hours per Week: ${pos.hoursPerWeek}</li>
          <li>Pay Rate: ${pos.payRate}</li>
          <li>Module Owner: ${escapeHtml(pos.moName)}</li>
        </ul>
        <p style="margin-top:12px">Please confirm your acceptance by responding to this offer within 7 days.</p>
        <p style="margin-top:16px">Best regards,<br><strong>${escapeHtml(pos.moName)}</strong><br>${pos.department}</p>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
