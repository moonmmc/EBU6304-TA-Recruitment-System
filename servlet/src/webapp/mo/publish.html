<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publish Position - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.publish-wrap {
  max-width: 920px;
  margin: 0 auto;
}
.publish-card {
  padding: 36px 40px 32px;
}
.publish-card .form-section {
  margin-bottom: 28px;
}
.publish-card .form-section:last-of-type {
  margin-bottom: 0;
}
.publish-section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin: 0 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--gray-100);
}
.publish-card .form-group { margin-bottom: 0; }
.publish-card .form-label {
  font-size: 14px;
  margin-bottom: 8px;
}
.publish-card .form-input,
.publish-card .form-textarea {
  padding: 12px 16px;
  font-size: 15px;
  border-radius: 10px;
}
.publish-card .form-textarea {
  min-height: 100px;
  line-height: 1.5;
}
.publish-card .form-row,
.publish-card .form-row-3 {
  gap: 24px;
  margin-bottom: 20px;
}
.publish-card .form-row:last-child,
.publish-card .form-row-3:last-child {
  margin-bottom: 0;
}
.publish-card .form-row-course {
  grid-template-columns: 2fr 1fr;
}
.publish-card .form-row-3 {
  grid-template-columns: repeat(3, 1fr);
}
.publish-optional {
  background: var(--gray-50);
  border: 1px solid var(--gray-100);
  border-radius: 12px;
  padding: 24px;
}
.publish-optional .form-group + .form-group {
  margin-top: 20px;
}
.publish-hint {
  margin: 24px 0 0;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--gray-600);
  background: #eff6ff;
  border-left: 4px solid var(--primary);
  border-radius: 0 8px 8px 0;
}
.publish-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid var(--gray-200);
}
.publish-actions .btn { padding: 12px 28px; font-size: 15px; }
.label-hint { font-weight: 400; color: var(--gray-400); }
.main-top.publish-header h2 { font-size: 26px; }
.main-top.publish-header .mt-desc { font-size: 15px; margin-top: 6px; }
@media (max-width: 768px) {
  .publish-card { padding: 24px 20px; }
  .publish-card .form-row,
  .publish-card .form-row-3,
  .publish-card .form-row-course { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="publish-wrap">
      <div class="main-top publish-header">
        <div>
          <h2>Publish Position</h2>
          <div class="mt-desc">Post a new TA vacancy for your course</div>
        </div>
      </div>

      <div class="card publish-card">
        <form id="publishForm" onsubmit="handlePublish(event)">
          <section class="form-section">
            <h3 class="publish-section-title">Course</h3>
            <div class="form-row form-row-course">
              <div class="form-group">
                <label class="form-label" for="courseName">Course name</label>
                <input class="form-input" id="courseName" type="text" placeholder="Software Engineering" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="courseCode">Course code</label>
                <input class="form-input" id="courseCode" type="text" placeholder="EBU6304" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="department">Department</label>
                <input class="form-input" id="department" type="text" value="International School" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="deadline">Application deadline</label>
                <input class="form-input" id="deadline" type="text" inputmode="numeric"
                       placeholder="YYYY-MM-DD" pattern="\d{4}-\d{2}-\d{2}" lang="en-US" required
                       title="Enter date as YYYY-MM-DD">
              </div>
            </div>
          </section>

          <section class="form-section">
            <h3 class="publish-section-title">Position details</h3>
            <div class="form-row form-row-3">
              <div class="form-group">
                <label class="form-label" for="numPositions">Open slots</label>
                <input class="form-input" type="number" id="numPositions" min="1" value="1" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="hoursPerWeek">Hours per week</label>
                <input class="form-input" type="number" id="hoursPerWeek" min="0" value="6" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="payRate">Pay rate</label>
                <input class="form-input" id="payRate" type="text" placeholder="50/hr" required>
              </div>
            </div>
          </section>

          <section class="form-section publish-optional">
            <h3 class="publish-section-title">Additional info</h3>
            <div class="form-group">
              <label class="form-label" for="requiredSkills">Required skills <span class="label-hint">(optional)</span></label>
              <input class="form-input" id="requiredSkills" type="text" placeholder="Java; Testing; UML">
            </div>
            <div class="form-group">
              <label class="form-label" for="duties">Duties <span class="label-hint">(optional)</span></label>
              <textarea class="form-textarea" id="duties" rows="4" placeholder="Lab support&#10;Grade assignments&#10;Office hours"></textarea>
            </div>
          </section>

          <p class="publish-hint">Admin approval is required before TAs can apply.</p>

          <div class="publish-actions">
            <a href="/mo/dashboard.html" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Publish position</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
bootstrapPage('MO', null, 'publish');

async function handlePublish(e) {
  e.preventDefault();
  const deadline = document.getElementById('deadline').value.trim();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(deadline)) {
    toast('Deadline must be YYYY-MM-DD', 'error');
    return;
  }
  try {
    await api('/positions', {
      method: 'POST',
      body: JSON.stringify({
        courseName: document.getElementById('courseName').value.trim(),
        courseCode: document.getElementById('courseCode').value.trim(),
        department: document.getElementById('department').value.trim(),
        numPositions: document.getElementById('numPositions').value,
        hoursPerWeek: document.getElementById('hoursPerWeek').value,
        payRate: document.getElementById('payRate').value.trim(),
        deadline,
        requiredSkills: document.getElementById('requiredSkills').value.trim(),
        duties: document.getElementById('duties').value.trim()
      })
    });
    toast('Published. Pending admin approval.');
    setTimeout(() => location.href = '/mo/dashboard.html', 1200);
  } catch (err) {
    toast(err.message, 'error');
  }
}
</script>
</body>
</html>
