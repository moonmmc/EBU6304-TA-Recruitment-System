<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publish Position - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div><h2>Publish New Position</h2><div class="mt-desc">Create a new TA position for your course</div></div>
    </div>

    <div class="card" style="max-width:720px">
      <form id="publishForm" onsubmit="handlePublish(event)">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Course Name</label><input class="form-input" id="courseName" placeholder="e.g. Software Engineering" required></div>
          <div class="form-group"><label class="form-label">Course Code</label><input class="form-input" id="courseCode" placeholder="e.g. EBU6304" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Department</label><input class="form-input" id="department" placeholder="e.g. International School" required></div>
          <div class="form-group"><label class="form-label">Number of Positions</label><input class="form-input" type="number" id="numPositions" min="1" value="1" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Hours per Week</label><input class="form-input" type="number" id="hoursPerWeek" min="0" value="6" required></div>
          <div class="form-group"><label class="form-label">Pay Rate</label><input class="form-input" id="payRate" placeholder="e.g. 50/hr" required></div>
        </div>
        <div class="form-group"><label class="form-label">Application Deadline</label><input class="form-input" type="date" id="deadline" required></div>
        <div class="form-group"><label class="form-label">Required Skills (semicolon separated)</label><input class="form-input" id="requiredSkills" placeholder="e.g. Java;Agile;Testing"></div>
        <div class="form-group"><label class="form-label">Duties (one per line)</label><textarea class="form-textarea" id="duties" rows="4" placeholder="Assist in lab sessions&#10;Grade assignments&#10;Hold office hours"></textarea></div>

        <div class="note-box">After submission, the position will require admin approval before it becomes visible to TAs.</div>

        <div class="modal-actions" style="margin-top:20px">
          <a href="/mo/dashboard.html" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Publish Position</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
bootstrapPage('MO', null, 'publish');

async function handlePublish(e) {
  e.preventDefault();
  try {
    await api('/positions', {
      method: 'POST',
      body: JSON.stringify({
        courseName: document.getElementById('courseName').value.trim(),
        courseCode: document.getElementById('courseCode').value.trim(),
        department: document.getElementById('department').value.trim(),
        numPositions: document.getElementById('numPositions').value,
        hoursPerWeek: document.getElementById('hoursPerWeek').value,
        payRate: document.getElementById('payRate').value.trim(),
        deadline: document.getElementById('deadline').value,
        requiredSkills: document.getElementById('requiredSkills').value.trim(),
        duties: document.getElementById('duties').value.trim()
      })
    });
    toast('Position published! Pending admin approval.');
    setTimeout(() => location.href = '/mo/dashboard.html', 1200);
  } catch (err) {
    toast(err.message, 'error');
  }
}
</script>
</body>
</html>
