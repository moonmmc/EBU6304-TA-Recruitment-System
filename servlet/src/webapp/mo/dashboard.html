<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MO Dashboard - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div>
        <h2 id="greeting">Dashboard</h2>
        <div class="mt-desc">Manage your TA positions and applications</div>
      </div>
      <a href="/mo/publish.html" class="btn btn-primary">+ New Position</a>
    </div>

    <div class="stat-grid" id="stats"></div>

    <div class="card">
      <div class="card-title">My Published Positions</div>
      <div class="table-wrapper" style="margin-top:12px;box-shadow:none;border:none">
        <table>
          <thead><tr><th>Course</th><th>Code</th><th>Positions</th><th>Deadline</th><th>Status</th><th>Applicants</th><th>Actions</th></tr></thead>
          <tbody id="posBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
bootstrapPage('MO', init, 'dashboard');

async function init() {
  document.getElementById('greeting').textContent = 'Welcome, ' + user.name + '!';

  const [positions, allApps] = await Promise.all([
    api('/positions?moId=' + user.id),
    api('/applications')
  ]);

  const approved = positions.filter(p => p.status === 'APPROVED').length;
  const pending = positions.filter(p => p.status === 'PENDING').length;
  const totalApps = allApps.filter(a => positions.some(p => p.id === a.positionId)).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="sc-icon">📝</div><div class="sc-label">Total Positions</div><div class="sc-value">${positions.length}</div></div>
    <div class="stat-card"><div class="sc-icon">✅</div><div class="sc-label">Approved</div><div class="sc-value">${approved}</div></div>
    <div class="stat-card"><div class="sc-icon">⏳</div><div class="sc-label">Pending Approval</div><div class="sc-value">${pending}</div></div>
    <div class="stat-card"><div class="sc-icon">👥</div><div class="sc-label">Total Applicants</div><div class="sc-value">${totalApps}</div></div>`;

  document.getElementById('posBody').innerHTML = positions.length === 0
    ? '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">No positions published yet</td></tr>'
    : positions.map(p => {
      const appCount = allApps.filter(a => a.positionId === p.id).length;
      const actions = p.status === 'APPROVED'
        ? `<button class="btn btn-sm btn-secondary" onclick="closePosition('${p.id}')">Close</button>`
        : '-';
      return `<tr>
        <td><strong>${escapeHtml(p.courseName)}</strong></td>
        <td>${p.courseCode}</td>
        <td>${p.numPositions}</td>
        <td>${p.deadline}</td>
        <td><span class="badge ${badgeClass(p.status)}">${p.status}</span></td>
        <td>${appCount}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('');
}

async function closePosition(id) {
  if (!confirm('Close this position? TAs will no longer be able to apply.')) return;
  try {
    await api('/positions/' + id + '/status', {
      method: 'PUT',
      body: JSON.stringify({ status: 'CLOSED' })
    });
    toast('Position closed');
    init();
  } catch (err) { toast(err.message, 'error'); }
}
</script>
</body>
</html>
