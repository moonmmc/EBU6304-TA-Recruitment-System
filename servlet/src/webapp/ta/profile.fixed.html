<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar">
    <a class="sidebar-brand" href="/ta/dashboard.html"><div class="sb-icon">TA</div><span>TA Recruitment</span></a>
    <nav class="sidebar-nav" aria-label="Main navigation">
      <div class="sidebar-section">Main</div>
      <a class="sidebar-item" href="/ta/dashboard.html"><span class="si-icon">📊</span>Dashboard</a>
      <a class="sidebar-item active" href="/ta/profile.html"><span class="si-icon">👤</span>My Profile</a>
      <div class="sidebar-section">Recruitment</div>
      <a class="sidebar-item" href="/ta/positions.html"><span class="si-icon">💼</span>Browse Positions</a>
      <a class="sidebar-item" href="/ta/applications.html"><span class="si-icon">📋</span>My Applications</a>
    </nav>
    <div class="sidebar-user"><div class="sidebar-avatar">?</div><div><div style="font-weight:600;font-size:13px">Loading</div><div style="font-size:11px;color:rgba(255,255,255,0.4)">TA</div></div></div>
  </nav>
  <main class="main-content">
    <div class="main-top">
      <div>
        <h2>My Profile</h2>
        <div class="mt-desc">Manage your personal information</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Personal Information</div>
        <form id="profileForm" class="profile-form" onsubmit="saveProfile(event)">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="pName" placeholder="e.g. Zhang San" autocomplete="name"></div>
            <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="pEmail" placeholder="e.g. zhangsan@bupt.edu.cn" autocomplete="email"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Phone</label><input class="form-input" type="tel" id="pPhone" placeholder="e.g. 13800000000" autocomplete="tel"></div>
            <div class="form-group"><label class="form-label">Programme</label><input class="form-input" id="pProgramme" placeholder="e.g. Computer Science"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Year of Study</label>
              <select class="form-select" id="pYear">
                <option value="">e.g. Year 2</option>
                <option>Year 1</option><option>Year 2</option><option>Year 3</option><option>Year 4</option><option>Postgraduate</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">University</label><input class="form-input" id="pUniversity" placeholder="e.g. Beijing University of Posts and Telecommunications"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">GPA</label><input class="form-input" id="pGpa" placeholder="e.g. 3.7" inputmode="decimal"></div>
            <div class="form-group"></div>
          </div>
          <div class="form-group"><label class="form-label">Skills (comma separated)</label><input class="form-input" id="pSkills" placeholder="e.g. Java, Python, SQL"></div>
          <div class="form-group"><label class="form-label">Experience</label><textarea class="form-textarea" id="pExperience" placeholder="e.g. TA for Data Structures, 1 semester"></textarea></div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>

      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title" style="margin-bottom:16px">Change Password</div>
          <form onsubmit="changePassword(event)">
            <div class="form-group"><label class="form-label">Current Password</label><input class="form-input" type="password" id="oldPwd" required></div>
            <div class="form-group"><label class="form-label">New Password</label><input class="form-input" type="password" id="newPwd" required></div>
            <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-input" type="password" id="confirmPwd" required></div>
            <button type="submit" class="btn btn-secondary">Update Password</button>
          </form>
        </div>

        <div class="card">
          <div class="card-title">Profile Summary</div>
          <div id="profileSummary" style="margin-top:12px;font-size:13px;color:var(--gray-500)"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
bootstrapPage('TA', init, 'profile');

async function init() {
  const u = await api('/users/' + user.id);

  document.getElementById('pName').value = u.name;
  document.getElementById('pEmail').value = u.email || '';
  document.getElementById('pPhone').value = u.phone || '';
  document.getElementById('pProgramme').value = u.programme || '';
  document.getElementById('pYear').value = u.yearOfStudy || '';
  document.getElementById('pUniversity').value = u.university || '';
  document.getElementById('pGpa').value = u.gpa || '';
  document.getElementById('pSkills').value = (u.skills || '').replace(/;/g, ', ');
  document.getElementById('pExperience').value = u.experience || '';

  updateSummary(u);
}

function updateSummary(u) {
  const skills = (u.skills || '').split(';').filter(Boolean);
  document.getElementById('profileSummary').innerHTML = `
    <div style="text-align:center;margin-bottom:16px">
      <div class="sidebar-avatar" style="width:64px;height:64px;font-size:24px;margin:0 auto 8px;background:var(--primary)">${initials(u.name)}</div>
      <div style="font-weight:700;color:var(--gray-800);font-size:15px">${escapeHtml(u.name)}</div>
      <div style="color:var(--gray-400);font-size:12px">${escapeHtml(u.programme || 'No programme')}</div>
      <div style="color:var(--gray-400);font-size:12px;margin-top:4px">${escapeHtml(u.email || 'No email')}</div>
    </div>
    <div style="border-top:1px solid var(--gray-100);padding-top:12px">
      <div style="margin-bottom:8px"><strong>University:</strong> ${u.university || '-'}</div>
      <div style="margin-bottom:8px"><strong>GPA:</strong> ${u.gpa || '-'}</div>
      <div style="margin-bottom:8px"><strong>Skills:</strong></div>
      <div>${skills.length ? skills.map(s => '<span class="tag">' + escapeHtml(s.trim()) + '</span>').join(' ') : '-'}</div>
    </div>`;
}

async function saveProfile(e) {
  e.preventDefault();
  try {
    const updated = await api('/users/' + user.id, {
      method: 'PUT',
      body: JSON.stringify({
        name: document.getElementById('pName').value.trim(),
        email: document.getElementById('pEmail').value.trim(),
        phone: document.getElementById('pPhone').value.trim(),
        programme: document.getElementById('pProgramme').value.trim(),
        yearOfStudy: document.getElementById('pYear').value,
        university: document.getElementById('pUniversity').value.trim(),
        gpa: document.getElementById('pGpa').value.trim(),
        skills: document.getElementById('pSkills').value.split(',').map(s => s.trim()).filter(Boolean).join(';'),
        experience: document.getElementById('pExperience').value.trim()
      })
    });
    setUser(updated);
    updateSummary(updated);
    setupAppChrome('TA', 'profile');
    toast('Profile updated successfully');
  } catch (err) {
    toast(err.message, 'error');
  }
}

async function changePassword(e) {
  e.preventDefault();
  if (document.getElementById('newPwd').value !== document.getElementById('confirmPwd').value) {
    toast('Passwords do not match', 'error'); return;
  }
  try {
    const r = await api('/users/' + user.id + '/password', {
      method: 'PUT',
      body: JSON.stringify({
        oldPassword: document.getElementById('oldPwd').value,
        newPassword: document.getElementById('newPwd').value
      })
    });
    if (r.success) { toast('Password changed'); document.getElementById('oldPwd').value = ''; document.getElementById('newPwd').value = ''; document.getElementById('confirmPwd').value = ''; }
    else toast(r.message || 'Failed', 'error');
  } catch (err) { toast(err.message, 'error'); }
}
</script>
</body>
</html>
