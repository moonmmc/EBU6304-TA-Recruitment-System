<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA Dashboard - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div>
        <h2 id="greeting">Dashboard</h2>
        <div class="mt-desc">Overview of your TA activities</div>
      </div>
    </div>

    <div class="stat-grid" id="stats"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Recent Applications</div>
        <div id="recentApps" style="margin-top:12px"></div>
      </div>
      <div class="card">
        <div class="card-title">Recommended Positions</div>
        <div id="recommended" style="margin-top:12px"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js?v=3"></script>
<script>
bootstrapPage('TA', init, 'dashboard');

async function init() {
  document.getElementById('greeting').textContent = 'Welcome, ' + user.name + '!';

  const [apps, positions] = await Promise.all([
    api('/applications?taId=' + user.id),
    api('/positions')
  ]);

  const pending = apps.filter(a => a.status === 'PENDING').length;
  const passed = apps.filter(a => a.status === 'PASSED').length;
  const failed = apps.filter(a => a.status === 'FAILED').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="sc-icon">📋</div><div class="sc-label">Total Applications</div><div class="sc-value">${apps.length}</div></div>
    <div class="stat-card"><div class="sc-icon">⏳</div><div class="sc-label">Pending</div><div class="sc-value">${pending}</div></div>
    <div class="stat-card"><div class="sc-icon">✅</div><div class="sc-label">Passed</div><div class="sc-value">${passed}</div></div>
    <div class="stat-card"><div class="sc-icon">💼</div><div class="sc-label">Open Positions</div><div class="sc-value">${positions.length}</div></div>`;

  const recent = apps.slice(-3).reverse();
  document.getElementById('recentApps').innerHTML = recent.length === 0
    ? '<div class="empty-state"><div class="es-icon">📋</div><div class="es-text">No applications yet</div></div>'
    : recent.map(a => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--gray-700)">${escapeHtml(a.positionTitle)}</div>
          <div style="font-size:11px;color:var(--gray-400)">${a.courseCode} · ${formatDate(a.appliedDate)}</div>
        </div>
        <span class="badge ${badgeClass(a.status)}">${a.status}</span>
      </div>`).join('');

  const rec = positions.slice(0, 3);
  document.getElementById('recommended').innerHTML = rec.length === 0
    ? '<div class="empty-state"><div class="es-icon">💼</div><div class="es-text">No positions available</div></div>'
    : rec.map(p => `
      <div style="padding:10px 0;border-bottom:1px solid var(--gray-100)">
        <div style="font-size:13px;font-weight:600;color:var(--gray-700)">${escapeHtml(p.courseName)}</div>
        <div style="font-size:11px;color:var(--gray-400)">${p.courseCode} · ${p.department} · Deadline: ${p.deadline}</div>
      </div>`).join('');
}
</script>
</body>
</html>
